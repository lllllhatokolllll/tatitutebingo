<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とうものビンゴ</title>
    <style>
        :root { --bg-color: #071126; --accent-color: #ffa502; --primary-color: #ff4757; }
        body { margin: 0; padding: 10px; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; }
        
        .bingo-wrapper { width: 100%; max-width: 420px; position: relative; }
        .bg-image { width: 100%; display: block; }
        
        .bingo-board { 
            position: absolute; top: 25.4%; left: 29.2%; 
            width: 41.6%; height: 70.8%; 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr); gap: 4.5% 3.5%; 
        }
        
        .cell { 
            background: rgba(255, 255, 255, 0.98); border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            padding: 2px; cursor: pointer; position: relative; aspect-ratio: 1/1; 
        }
        .cell.selected { background: #ffeaa7; }
        .cell-text { font-size: 10px; font-weight: bold; color: #1a252f; z-index: 6; pointer-events: none; }
        .stamp-video { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; z-index: 7; }
        .cell.selected .stamp-video { display: block; }
        
        /* 景品画面のスタイル */
        #resultScreen { 
            display: none; width: 100%; max-width: 420px; margin-top: 20px; 
            background: #ff4757; color: white; padding: 20px; border-radius: 15px; 
        }
    </style>
</head>
<body>

    <div class="bingo-wrapper">
        <img src="haikei.png" class="bg-image">
        <div class="bingo-board" id="board"></div>
    </div>

    <div id="resultScreen">
        <h3>🎆 ビンゴ！おめでとう！ 🎆</h3>
        <p>場所：盆踊り受付（常盤南小学校）</p>
        <p>時間：18時半 〜 20時</p>
        <p><strong>けいひん：屋台チケット</strong></p>
        <button onclick="alert('スタッフ確認済みです')">スタッフ確認ボタン</button>
    </div>

    <script>
        const items = [
            '舞台に上がって<br>たのしんだ','来年も来る！！','加藤さん<br>みつけた！',
            'オタゲーを<br>観た！','ゲームに<br>参加した','屋台でお<br>買物をした',
            '盆踊りを<br>踊った','先生に<br>会った','消防団に<br>挨拶した'
        ];

        const board = document.getElementById('board');
        let cells = [];

        items.forEach((text, i) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<div class="cell-text">${text}</div><video class="stamp-video" src="uchiwa.mp4" loop muted playsinline></video>`;
            cell.onclick = () => {
                cell.classList.toggle('selected');
                const v = cell.querySelector('video');
                if(cell.classList.contains('selected')) v.play(); else { v.pause(); v.currentTime = 0; }
                checkBingo();
            };
            board.appendChild(cell);
            cells.push(cell);
        });

        function checkBingo() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            if(lines.some(l => l.every(i => cells[i].classList.contains('selected')))) {
                document.getElementById('resultScreen').style.display = 'block';
                board.style.pointerEvents = 'none'; // 揃ったらタップ不可に
            }
        }
    </script>
</body>
</html>
