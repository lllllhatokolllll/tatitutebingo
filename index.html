<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とうものビンゴ</title>
    <style>
        :root { --bg-color: #071126; --accent-color: #ffa502; --primary-color: #ff4757; }
        body { margin: 0; padding: 10px; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; }
        
        .bingo-wrapper { width: 100%; max-width: 420px; position: relative; }
        .bg-image { width: 100%; display: block; }
        
        /* 🎯 水色の領域内にめいっぱい広げるための設定 */
        .bingo-board { 
            position: absolute; 
            top: 25.4%; left: 29.2%; 
            width: 41.6%; height: 70.8%; 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr); gap: 4%; 
        }
        
        .cell { background: rgba(255, 255, 255, 0.98); border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 2px; cursor: pointer; position: relative; }
        .cell-text { font-size: 11px; font-weight: bold; color: #1a252f; z-index: 6; pointer-events: none; }
        .stamp-video { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; z-index: 7; }
        .cell.selected .stamp-video { display: block; }

        /* 花火演出（画面全体） */
        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: none; }
        
        /* 達成ポップアップ */
        #clearPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7,17,38,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        /* スタッフ確認ボタン（元の形） */
        .staff-button { padding: 12px 30px; background: #fff; color: #ff4757; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="bingo-wrapper">
        <img src="haikei.png" class="bg-image">
        <div class="bingo-board" id="board"></div>
    </div>

    <div id="clearPopup">
        <h2>🎆 ビンゴ達成！ 🎆</h2>
        <div id="resultInfo" style="margin:20px; text-align:left;">
            <p>場所：盆踊り受付（常盤南小学校）</p>
            <p>時間：18時半 〜 20時</p>
            <p>けいひん：屋台チケット</p>
        </div>
        <button class="staff-button" onclick="alert('スタッフ確認済み')">スタッフ確認</button>
    </div>

    <script>
        const items = [
            '<ruby>舞台<rt>ぶたい</rt></ruby>に<ruby>上<rt>あ</rt></ruby>がって<br>たのしんだ',
            '<ruby>絶対<rt>ぜったい</rt></ruby>に<br><ruby>来年<rt>らいねん</rt></ruby>も来る！！',
            '加藤ふみあきさんを<br>みつけた！',
            'オタゲーを<br>観た！',
            'とうもの会の<br>ゲームに<ruby>参加<rt>さんか</rt></ruby>した', 
            '<ruby>屋台<rt>やたい</rt></ruby>でお買物をした',
            '<ruby>盆踊<rt>ぼんおど</rt></ruby>りを<br>1<ruby>曲以上<rt>きょくいじょう</rt></ruby>おどった',
            '学校の<br><ruby>先生<rt>せんせい</rt></ruby>に会った',
            '<ruby>消防団<rt>しょうぼうだん</rt></ruby>の人に<br><ruby>挨拶<rt>あいさつ</rt></ruby>した'
        ];

        const board = document.getElementById('board');
        let cells = [];

        items.forEach((text) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<div class="cell-text">${text}</div><video class="stamp-video" src="uchiwa.mp4" loop muted playsinline></video>`;
            cell.onclick = () => {
                cell.classList.toggle('selected');
                const v = cell.querySelector('video');
                if(cell.classList.contains('selected')) v.play(); else { v.pause(); v.currentTime = 0; }
                checkBingo();
            };
            board.appendChild(cell);
            cells.push(cell);
        });

        function checkBingo() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            if(lines.some(l => l.every(i => cells[i].classList.contains('selected')))) {
                document.getElementById('clearPopup').style.display = 'flex';
                board.style.pointerEvents = 'none';
            }
        }
    </script>
</body>
</html>
